backend:
  name: github
  repo: chancgai/weiken-website
  branch: master
  auth_type: pkce
  app_id: REPLACE_WITH_YOUR_CLIENT_ID

site_url: https://www.wcan-amorphous.cn
media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Website Pages"
    label_singular: "Page"
    delete: false
    create: false
    files:
      - file: "index.html"
        label: "Home"
        name: "index"
        format: html
        fields:
          - {label: "HTML Content", name: "body", widget: "text", hint: "Edit page HTML. Only modify text content, do not change HTML tags."}
      - file: "about.html"
        label: "About Us"
        name: "about"
        format: html
        fields:
          - {label: "HTML Content", name: "body", widget: "text", hint: "Edit page HTML. Only modify text content, do not change HTML tags."}
