<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager - WCAN</title>
  <link rel="stylesheet" href="https://unpkg.com/decap-cms@latest/dist/decap-cms.css" />
  <style>
    textarea {
      font-family: 'Consolas', 'Monaco', monospace !important;
      font-size: 13px !important;
      min-height: 600px !important;
    }
  </style>
</head>
<body>
  <script>
    // Set Netlify site URL for Identity widget
    // Site is on GitHub Pages, but Identity service is on Netlify
    localStorage.setItem("netlifySiteURL", "https://eloquent-florentine-5d5215.netlify.app");
  </script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    // Configure Identity widget to use Netlify API URL
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          window.netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
  <script src="https://unpkg.com/decap-cms@latest/dist/decap-cms.js"></script>
</body>
</html>
